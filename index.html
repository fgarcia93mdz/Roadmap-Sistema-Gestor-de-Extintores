    // --- Render Sidebar ---
    function renderSidebar() {
      const sb = document.getElementById('sidebar');
      sb.innerHTML = '<h2>ROADMAP</h2>';
      slides.forEach((slide, idx) => {
        const item = document.createElement('div');
        item.className = 'menu-item' + (idx === 0 ? ' active' : '');
        item.innerText = slide.title || `Slide ${idx + 1}`;
        item.onclick = () => showSlide(idx);
        sb.appendChild(item);
      });
    }
    // --- Helpers para color de título ---
    function getColor(val) {
      if (!val) return '';
      if (val.startsWith('var(')) return val;
      if (val.startsWith('#') || val.startsWith('rgb')) return val;
      // Permitir nombres de color del logo
      if (val === 'rojo' || val === 'red') return 'var(--logo-red)';
      if (val === 'azul' || val === 'blue') return 'var(--logo-blue)';
      if (val === 'amarillo' || val === 'yellow') return 'var(--logo-yellow)';
      if (val === 'oscuro' || val === 'dark') return 'var(--logo-dark)';
      return val;
    }

    // --- Render Slides ---
    function renderSlides() {
      const pc = document.getElementById('pageContent');
      pc.innerHTML = '';
      slides.forEach((slide, idx) => {
        const slideDiv = document.createElement('div');
        slideDiv.className = 'slide' + (idx === 0 ? ' active' : '');
        slideDiv.style.background = slide.color || '#fff';
        // Título
        const title = document.createElement('h1');
        title.innerText = slide.title || `Slide ${idx + 1}`;
        if (slide.titleColor) title.style.color = getColor(slide.titleColor);
        slideDiv.appendChild(title);
        // Campos
        if (slide.fields && slide.fields.length) {
          const grid = document.createElement('div');
          grid.className = 'grid';
          let blockFields = [];
          slide.fields.forEach(field => {
            if (field.type === 'timeline') return blockFields.push(field);
            if (field.type === 'textarea') return blockFields.push(field);
            if (field.type === 'color') return blockFields.push(field);
            // Card para tipos simples
            const card = document.createElement('div');
            card.className = 'card';
            if (field.type === 'text' || field.type === 'number') {
              const h3 = document.createElement('h3');
              h3.innerText = field.label;
              if (field.titleColor) h3.style.color = getColor(field.titleColor);
              card.appendChild(h3);
              const p = document.createElement('p');
              p.innerText = field.value;
              card.appendChild(p);
            } else if (field.type === 'image') {
              const h3 = document.createElement('h3');
              h3.innerText = field.label;
              if (field.titleColor) h3.style.color = getColor(field.titleColor);
              card.appendChild(h3);
              const img = document.createElement('img');
              img.src = field.value;
              img.alt = field.label;
              img.style.maxWidth = '100%';
              img.style.borderRadius = '8px';
              img.style.marginTop = '8px';
              card.appendChild(img);
            }
            grid.appendChild(card);
          });
          if (grid.children.length) slideDiv.appendChild(grid);
          // Bloques especiales (textarea, timeline, color)
          blockFields.forEach(field => {
            if (field.type === 'textarea') {
              const block = document.createElement('div');
              block.className = 'block';
              const h3 = document.createElement('h3');
              h3.innerText = field.label;
              if (field.titleColor) h3.style.color = getColor(field.titleColor);
              block.appendChild(h3);
              const p = document.createElement('div');
              p.innerText = field.value;
              block.appendChild(p);
              slideDiv.appendChild(block);
            } else if (field.type === 'color') {
              const block = document.createElement('div');
              block.className = 'block';
              const h3 = document.createElement('h3');
              h3.innerText = field.label;
              if (field.titleColor) h3.style.color = getColor(field.titleColor);
              block.appendChild(h3);
              const colorBox = document.createElement('div');
              colorBox.style.width = '60px';
              colorBox.style.height = '30px';
              colorBox.style.borderRadius = '6px';
              colorBox.style.background = field.value;
              colorBox.style.border = '1.5px solid #e2e8f0';
              colorBox.style.margin = '8px 0';
              block.appendChild(colorBox);
              slideDiv.appendChild(block);
            } else if (field.type === 'timeline') {
              const block = document.createElement('div');
              block.className = 'timeline-pro';
              block.innerHTML = '<div class="line"></div>';
              // Progreso global
              let total = 0, sum = 0;
              if (Array.isArray(field.value)) {
                total = field.value.length;
                sum = field.value.reduce((acc, s) => acc + (s.progreso || 0), 0);
              }
              const global = document.createElement('div');
              global.style.marginBottom = '20px';
              global.innerHTML = 'Progreso total: <b>' + (total ? Math.round(sum / total) : 0) + '%</b>';
              block.appendChild(global);
              // Timeline
              if (Array.isArray(field.value)) {
                field.value.forEach((step, i) => {
                  const div = document.createElement('div');
                  div.className = 'timeline-item ' + (step.status || '');
                  div.innerHTML = `
                    <div class="timeline-card">
                      <h3${step.titleColor ? ` style=\"color:${getColor(step.titleColor)}\"` : ''}>${step.semana || ''}</h3>
                      <p><b>${step.titulo || ''}</b></p>
                      <p>${step.detalle || ''}</p>
                      <div class="progress-bar"><div style="width:${step.progreso || 0}%"></div></div>
                    </div>
                    <div class="dot"></div>
                  `;
                  block.appendChild(div);
                });
              }
              slideDiv.appendChild(block);
            }
          });
        }
        document.getElementById('pageContent').appendChild(slideDiv);
      });
    }
    // --- Navegación ---
    function showSlide(idx) {
      document.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('active', i === idx));
      document.querySelectorAll('.menu-item').forEach((m, i) => m.classList.toggle('active', i === idx));
    }
    // --- Pantalla completa ---
    document.getElementById('fullscreenBtn').onclick = function () {
      const docElm = document.documentElement;
      if (!document.fullscreenElement) {
        if (docElm.requestFullscreen) docElm.requestFullscreen();
        else if (docElm.mozRequestFullScreen) docElm.mozRequestFullScreen();
        else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen();
        else if (docElm.msRequestFullscreen) docElm.msRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
      }
    };
    // --- Toast profesional ---
    function showMessage(msg, color = '#16a34a') {
      const toast = document.getElementById('toast');
      let icon = '';
      toast.className = 'toast';
      toast.style.display = 'flex';
      if (color === '#16a34a' || color === 'var(--success)') {
        toast.classList.add('toast-success');
        icon = '✔️';
      } else if (color === '#d32f2f' || color === 'var(--danger)') {
        toast.classList.add('toast-error');
        icon = '❌';
      } else {
        icon = 'ℹ️';
      }
      toast.innerHTML = `<span style='font-size:1.35em;margin-right:6px;'>${icon}</span> <span>${msg}</span>`;
      setTimeout(() => { toast.classList.add('toast-show'); }, 10);
      setTimeout(() => {
        toast.classList.remove('toast-show');
        setTimeout(() => { toast.className = 'toast'; toast.innerHTML = ''; toast.style.display = 'none'; }, 400);
      }, 2200);
    }
